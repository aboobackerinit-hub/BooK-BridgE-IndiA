<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline | BookBridge India</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f9fafb;
      color: #1f2937;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    h1 { margin-top: 0; color: #10b981; }
    p { margin-bottom: 24px; color: #6b7280; }
    button {
      background-color: #10b981;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #059669; }
  </style>
</head>
<body>
  <div class="container">
    <h1>You are offline</h1>
    <p>Please check your internet connection. We couldn't load the latest version of BookBridge India.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
